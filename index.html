<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>LUMA®</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Bodoni Moda', 'Times New Roman', Georgia, serif;
            background: #F3F4F6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar {
            display: none
        }

        .experience {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden
        }

        .bg-base {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 70% 65% at 50% 48%, #FFFFFF 0%, transparent 70%),
                linear-gradient(170deg, #F9FAFB 0%, #F3F4F6 35%, #E5E7EB 70%, #D1D5DB 100%);
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            will-change: transform
        }

        .bg-glow-1 {
            background: radial-gradient(ellipse 40% 36% at 40% 42%, rgba(200, 205, 220, 0.5) 0%, rgba(220, 225, 240, 0.2) 40%, transparent 68%);
            animation: gIn 2.5s .1s ease forwards, d1 22s 2.6s ease-in-out infinite;
        }

        .bg-glow-2 {
            background: radial-gradient(ellipse 34% 40% at 60% 56%, rgba(210, 215, 230, 0.4) 0%, rgba(230, 235, 250, 0.15) 38%, transparent 65%);
            animation: gIn 2.5s .3s ease forwards, d2 26s 2.8s ease-in-out infinite;
        }

        .bg-glow-3 {
            background: radial-gradient(ellipse 26% 23% at 50% 46%, rgba(190, 195, 210, 0.35) 0%, transparent 58%);
            animation: gIn 3s .5s ease forwards, d3 18s 3.5s ease-in-out infinite;
        }

        @keyframes gIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes d1 {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            33% {
                transform: translate(2.5%, 1.5%) scale(1.02)
            }

            66% {
                transform: translate(-1.5%, -1%) scale(.98)
            }
        }

        @keyframes d2 {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            33% {
                transform: translate(-2%, -2%) scale(1.01)
            }

            66% {
                transform: translate(2%, 1%) scale(.99)
            }
        }

        @keyframes d3 {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            50% {
                transform: translate(1.5%, -1%) scale(1.04)
            }
        }

        .bg-center {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            background: radial-gradient(ellipse 22% 18% at 50% 46%, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.2) 35%, transparent 60%);
            animation: gIn 3s 1.2s ease forwards, cp 7s 4.2s ease-in-out infinite;
        }

        @keyframes cp {

            0%,
            100% {
                opacity: .5;
                transform: scale(1)
            }

            50% {
                opacity: .75;
                transform: scale(1.06)
            }
        }

        .bg-grain {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            opacity: 0;
            animation: gIn 3s 1s ease forwards;
        }

        .bg-grain::after {
            content: '';
            position: absolute;
            inset: -100%;
            width: 300%;
            height: 300%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="noise"/><feColorMatrix in="noise" type="saturate" values="0"/></filter><rect width="100%25" height="100%25" filter="url(%23n)" opacity="0.035"/></svg>');
            background-size: 200px 200px;
            opacity: .5;
            mix-blend-mode: overlay;
        }

        .bg-vignette {
            position: fixed;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            background: radial-gradient(ellipse 60% 56% at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.05) 55%, rgba(0, 0, 0, 0.15) 100%);
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 3.5vh 5vw;
        }

        .top-text, .bottom-text {
            font-size: clamp(.75rem, 1.1vw, 1rem);
            font-weight: 400;
            letter-spacing: .38em;
            text-transform: uppercase;
            font-style: italic;
            color: #111827;
            opacity: 0;
            transform: translateY(10px);
            animation: rU 1.8s .4s cubic-bezier(.22, 1, .36, 1) forwards;
            text-align: center;
            line-height: 1.9;
        }

        .top-text {
            margin-bottom: clamp(2vh, 4.5vh, 5vh);
        }

        .bottom-text {
            margin-top: clamp(4vh, 6vh, 8vh);
            animation-delay: 0.6s;
        }

        @keyframes rU {
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(2rem, 6vw, 5rem);
        }

        .dot-grid-wrapper {
            position: relative;
        }

        .dot-grid {
            display: grid;
            grid-template-columns: repeat(12, var(--dot-size));
            gap: var(--dot-gap)
        }

        .dot {
            width: var(--dot-size);
            height: var(--dot-size);
            background: #4B5563;
            border-radius: 0;
            opacity: 0;
            will-change: opacity, transform;
            transform: translate3d(0, 0, 0);
        }

        .bottom-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(.5rem, 1vh, .9rem)
        }

        .logo {
            font-family: 'Tenor Sans', sans-serif;
            font-size: clamp(4rem, 11vw, 8.5rem);
            font-weight: 400;
            letter-spacing: .25em;
            line-height: 1;
            background: linear-gradient(160deg, #E2E6EA 0%, #838890 45%, #15171A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            opacity: 0;
            transform: translateY(14px);
            animation: rU 2.2s 2.8s cubic-bezier(.22, 1, .36, 1) forwards;
            text-indent: .25em;
        }

        .logo .reg {
            font-size: .22em;
            vertical-align: text-top;
            letter-spacing: 0;
            font-weight: 400;
            margin-left: -1.9em;
            /* Offsets the parent's letter-spacing to pull it snug against the A */
            font-style: normal;
        }

        .divider {
            width: clamp(20px, 2.5vw, 32px);
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.4), transparent);
            opacity: 0;
            animation: rU 1.5s 3.1s cubic-bezier(.22, 1, .36, 1) forwards;
        }

        .footer-section {
            position: absolute;
            bottom: clamp(3vh, 5vh, 6vh);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }

        .coming-soon {
            font-size: clamp(.65rem, 1vw, .85rem);
            font-weight: 400;
            letter-spacing: .55em;
            text-transform: uppercase;
            font-style: italic;
            color: rgba(0, 0, 0, 0.75);
            opacity: 0;
            transform: translateY(6px);
            animation: rU 1.5s 3.2s cubic-bezier(.22, 1, .36, 1) forwards;
            text-indent: .55em;
        }

        .release-text {
            font-size: clamp(.6rem, .85vw, .75rem);
            font-weight: 400;
            letter-spacing: .45em;
            font-style: italic;
            color: rgba(0, 0, 0, 0.7);
            opacity: 0;
            transform: translateY(4px);
            animation: rU 1.5s 3.4s cubic-bezier(.22, 1, .36, 1) forwards;
            text-indent: .45em;
        }

        :root {
            --dot-size: 6px;
            --dot-gap: 15px
        }

        @media(max-width:1024px) {
            :root {
                --dot-size: 5px;
                --dot-gap: 12px
            }
        }

        @media(max-width:768px) {
            :root {
                --dot-size: 4px;
                --dot-gap: 9px
            }

            .main-container {
                flex-direction: column;
                gap: 2rem;
            }
        }

        @media(max-width:480px) {
            :root {
                --dot-size: 3px;
                --dot-gap: 7px
            }
        }

        @media(max-height:580px) {
            :root {
                --dot-size: 3px;
                --dot-gap: 6px
            }

            .top-text {
                margin-bottom: 1.2vh !important
            }
            .bottom-text {
                margin-top: 2vh !important
            }
        }

        @media(prefers-reduced-motion:reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .01ms !important
            }

            .bg-glow-1,
            .bg-glow-2,
            .bg-glow-3 {
                opacity: 1 !important
            }

            .bg-center {
                opacity: .5 !important
            }

            .bg-grain {
                opacity: 1 !important
            }

            .dot {
                opacity: .32 !important;
                transform: none !important
            }
        }
    </style>
</head>

<body>
    <div class="experience">
        <div class="bg-base"></div>
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
        <div class="bg-glow bg-glow-3"></div>
        <div class="bg-center"></div>
        <div class="bg-grain"></div>
        <div class="bg-vignette"></div>

        <div class="content">
            <p class="top-text">ARCHITECTURAL LIGHTS BY SYNC</p>
            <div class="main-container">
                <div class="dot-grid-wrapper" id="dotWrapper">
                    <div class="dot-grid" id="dotGrid"></div>
                </div>
                <div class="bottom-section">
                    <h1 class="logo">LUMA<span class="reg">®</span></h1>
                    <div class="divider"></div>
                </div>
            </div>
            <p class="bottom-text">LIGHT. MOOD. ARCHITECTURE.</p>
            <div class="footer-section">
                <p class="coming-soon">COMING SOON</p>
                <p class="release-text">2027</p>
            </div>
        </div>
    </div>

    <script>
        const ROWS = 9, COLS = 12, TOTAL = ROWS * COLS;
        const gridEl = document.getElementById('dotGrid');
        const reducedMotion = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

        const CLOCK_ASSEMBLE_END = 2500, CLOCK_ROTATE_END = 5000, GRID_ASSEMBLE_END = 7500, WAVE_END = 11300, SCATTER_END = 13100, CYCLE = 13700;
        const scatterR = Math.min(window.innerWidth, window.innerHeight) * .42;
        const cR = (ROWS - 1) / 2, cC = (COLS - 1) / 2, maxD = Math.sqrt(cR * cR + cC * cC);

        let cellW = 21, cellH = 21;
        function updateDims() {
            const root = getComputedStyle(document.documentElement);
            const ds = parseFloat(root.getPropertyValue('--dot-size')) || 6;
            const dg = parseFloat(root.getPropertyValue('--dot-gap')) || 15;
            cellW = ds + dg;
            cellH = ds + dg;
        }
        window.addEventListener('resize', updateDims);
        updateDims();

        const easeOutExpo = t => t >= 1 ? 1 : 1 - Math.pow(2, -10 * t);
        const easeInCubic = t => t * t * t;

        function rndS() {
            const a = Math.random() * Math.PI * 2, d = (.4 + Math.random() * .6) * scatterR;
            return { x: Math.cos(a) * d, y: Math.sin(a) * d, rot: (Math.random() - .5) * 180 };
        }
        function rndC(fx, fy) {
            const b = Math.atan2(fy, fx), dir = Math.random() > .5 ? 1 : -1;
            const a = b + dir * (Math.PI * .3 + Math.random() * .5), amt = 25 + Math.random() * 45;
            return { x: Math.cos(a) * amt, y: Math.sin(a) * amt };
        }

        const dots = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const el = document.createElement('div');
                el.className = 'dot';
                if (r === 0 && c === 0) el.style.background = '#ff0000';
                gridEl.appendChild(el);
                const nd = Math.sqrt((r - cR) ** 2 + (c - cC) ** 2) / maxD;
                const sc = rndS(), cv = rndC(sc.x, sc.y), ns = rndS();
                
                const i = r * COLS + c;
                let clockX = 0, clockY = 0, clockRadius = 0, clockType = '';
                if (i < 60) {
                    const a = (i / 60) * Math.PI * 2;
                    clockX = Math.cos(a); clockY = Math.sin(a); clockType = 'dial';
                } else if (i < 72) {
                    const a = ((i - 60) / 12) * Math.PI * 2 - Math.PI / 2; // Start top
                    clockX = Math.cos(a); clockY = Math.sin(a); clockType = 'marker';
                } else if (i < 87) {
                    clockRadius = (i - 72 + 1) / 15; clockType = 'hour_hand';
                } else {
                    clockRadius = (i - 87 + 1) / 21; clockType = 'minute_hand';
                }

                dots.push({
                    el, row: r, col: c, nd, ph: Math.random() * Math.PI * 2,
                    sx: sc.x, sy: sc.y, sr: sc.rot, cx: cv.x, cy: cv.y,
                    nx: ns.x, ny: ns.y, nr: ns.rot,
                    clockX, clockY, clockRadius, clockType,
                    caDelay: 200 + Math.random() * 600, caDur: 1200 + Math.random() * 500,
                    gaDelay: 200 + nd * 600 + Math.random() * 200, gaDur: 1200 + Math.random() * 400,
                    sDelay: (1 - nd) * 600 + Math.random() * 100, sDur: 900 + Math.random() * 200,
                    base: .28 + Math.random() * .06
                });
            }
        }

        function newCycle() {
            for (const d of dots) {
                d.sx = d.nx; d.sy = d.ny; d.sr = d.nr;
                const cv = rndC(d.sx, d.sy); d.cx = cv.x; d.cy = cv.y;
                const ns = rndS(); d.nx = ns.x; d.ny = ns.y; d.nr = ns.rot;
                d.caDelay = 200 + Math.random() * 600; d.caDur = 1200 + Math.random() * 500;
                d.gaDelay = 200 + d.nd * 600 + Math.random() * 200; d.gaDur = 1200 + Math.random() * 400;
                d.sDelay = (1 - d.nd) * 600 + Math.random() * 100; d.sDur = 900 + Math.random() * 200;
            }
        }

        const t0 = performance.now(); let lastCyc = 0;

        function frame(now) {
            const elapsed = now - t0, ct = elapsed % CYCLE, cyc = Math.floor(elapsed / CYCLE);
            if (cyc > lastCyc) { lastCyc = cyc; newCycle() }

            if (reducedMotion) {
                for (let i = 0; i < TOTAL; i++) {
                    const t = Math.max(0, Math.min(1, (ct - 400 - i * 10) / 600));
                    if (t > 0) dots[i].el.style.opacity = easeOutExpo(t) * .32;
                }
                requestAnimationFrame(frame); return;
            }

            const time = elapsed * .001;
            const phase = ct < CLOCK_ASSEMBLE_END ? 'ca' : 
                          ct < CLOCK_ROTATE_END ? 'cr' : 
                          ct < GRID_ASSEMBLE_END ? 'ga' : 
                          ct < WAVE_END ? 'w' : 
                          ct < SCATTER_END ? 's' : 'p';
            
            const crProgress = Math.max(0, Math.min(1, (ct - CLOCK_ASSEMBLE_END) / (CLOCK_ROTATE_END - CLOCK_ASSEMBLE_END)));
            const spinEase = crProgress < 0.5 ? 4 * crProgress * crProgress * crProgress : 1 - Math.pow(-2 * crProgress + 2, 3) / 2;
            const minAngle = -Math.PI / 2 + spinEase * Math.PI * 2 * 1.5;
            const hourAngle = -Math.PI / 2 + spinEase * Math.PI * 2 * (1.5 / 12); 

            let flash = 0;
            if (phase === 'w') { const we = ct - GRID_ASSEMBLE_END; if (we < 800) flash = Math.sin(we / 800 * Math.PI) * .38 }

            for (const d of dots) {
                const { el, ph } = d;

                let cX = 0, cY = 0;
                if (d.clockType === 'dial') {
                    cX = d.clockX * cellW * 5.2; cY = d.clockY * cellW * 5.2;
                } else if (d.clockType === 'marker') {
                    cX = d.clockX * cellW * 4.2; cY = d.clockY * cellW * 4.2;
                } else if (d.clockType === 'hour_hand') {
                    cX = Math.cos(hourAngle) * (d.clockRadius * cellW * 2.8); cY = Math.sin(hourAngle) * (d.clockRadius * cellW * 2.8);
                } else if (d.clockType === 'minute_hand') {
                    cX = Math.cos(minAngle) * (d.clockRadius * cellW * 4.4); cY = Math.sin(minAngle) * (d.clockRadius * cellW * 4.4);
                }

                const targetTx = cX - (d.col - cC) * cellW;
                const targetTy = cY - (d.row - cR) * cellH;

                if (phase === 'ca') {
                    const raw = Math.max(0, Math.min(1, (ct - d.caDelay) / d.caDur));
                    if (raw <= 0) { el.style.transform = `translate3d(${d.sx}px,${d.sy}px,0) rotate(${d.sr}deg) scale(.3)`; el.style.opacity = '0'; continue }
                    const e = easeOutExpo(raw), cf = Math.sin(raw * Math.PI);
                    const tx = d.sx * (1 - e) + targetTx * e + d.cx * cf;
                    const ty = d.sy * (1 - e) + targetTy * e + d.cy * cf;
                    el.style.transform = `translate3d(${tx}px,${ty}px,0) rotate(${d.sr * (1 - e)}deg) scale(${.3 + .7 * e})`;
                    el.style.opacity = easeOutExpo(Math.min(1, raw / .55)) * d.base;

                } else if (phase === 'cr') {
                    el.style.transform = `translate3d(${targetTx}px,${targetTy}px,0) scale(1)`;
                    el.style.opacity = d.base;

                } else if (phase === 'ga') {
                    const raw = Math.max(0, Math.min(1, (ct - CLOCK_ROTATE_END - d.gaDelay) / d.gaDur));
                    if (raw <= 0) {
                        el.style.transform = `translate3d(${targetTx}px,${targetTy}px,0) scale(1)`;
                        el.style.opacity = d.base;
                        continue;
                    }
                    const e = easeOutExpo(raw);
                    const tx = targetTx * (1 - e);
                    const ty = targetTy * (1 - e);
                    const cf = Math.sin(raw * Math.PI) * 15; 
                    el.style.transform = `translate3d(${tx + cf}px,${ty - cf}px,0) scale(1)`;
                    el.style.opacity = d.base;

                } else if (phase === 'w') {
                    const w1 = Math.sin((d.col * .5 - time * .4) + ph * .3) * .5 + .5;
                    const w2 = Math.sin((d.row * .45 - time * .28) + ph * .2) * .5 + .5;
                    const w3 = Math.sin(((d.col + d.row) * .28 - time * .15) + ph * .15) * .5 + .5;
                    const w4 = Math.sin((d.nd * 3 - time * .5) + ph * .1) * .5 + .5;
                    const pu = Math.sin(time * .7 + ph) * .5 + .5;
                    const wb = w1 * .25 + w2 * .16 + w3 * .08 + w4 * .14 + pu * .05;
                    const sc = 1 + w1 * .12 + w4 * .07, yl = -(w4 * .8 + w1 * .4);
                    let op = Math.max(.14, Math.min(.95, d.base + wb + flash));
                    el.style.opacity = op;
                    el.style.transform = `translate3d(0,${yl}px,0) scale(${sc})`;

                } else if (phase === 's') {
                    const raw = Math.max(0, Math.min(1, (ct - WAVE_END - d.sDelay) / d.sDur));
                    if (raw <= 0) { el.style.transform = 'translate3d(0,0,0) scale(1)'; el.style.opacity = d.base; continue }
                    const e = easeInCubic(raw), cf = Math.sin(raw * Math.PI) * .3 * (1 - e);
                    el.style.transform = `translate3d(${d.nx * e + d.cx * cf}px,${d.ny * e + d.cy * cf}px,0) rotate(${d.nr * e}deg) scale(${1 - .7 * e})`;
                    el.style.opacity = Math.max(0, d.base * (1 - e));

                } else {
                    el.style.transform = `translate3d(${d.nx}px,${d.ny}px,0) rotate(${d.nr}deg) scale(.3)`;
                    el.style.opacity = '0';
                }
            }
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    </script>
</body>

</html>
